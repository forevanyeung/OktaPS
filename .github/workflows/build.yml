name: Build OktaPS module
on: 
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - 'OktaPS/**'

jobs:
  build:
    name: Build module
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: mcr.microsoft.com/dotnet/sdk:latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix workspace ownership for gitversion
        run: chown -R $(id -u):$(id -g) ${{ github.workspace }}

      - name: Install InvokeBuild module
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module InvokeBuild
      
      - name: Install GitVersion tool
        uses: gittools/actions/gitversion/setup@71a79f7569b981036febd9ce5870f87e069928e7 #v4.3.3
        with:
          versionSpec: '6.6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@71a79f7569b981036febd9ce5870f87e069928e7 #v4.3.3

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.gitversion.outputs.MajorMinorPatch }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Perform an Invoke-Build from the command line
        shell: pwsh
        run: Invoke-Build Build -SemVer ${{ steps.gitversion.outputs.MajorMinorPatch }}

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release

      - name: Publish to PSGallery
        shell: pwsh
        run: Invoke-Build Publish -NugetServer "https://www.powershellgallery.com/api/v2/package/" -NugetApiKey ${{ secrets.PSGALLERY_API }}
